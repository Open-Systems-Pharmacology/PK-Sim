name: Build Nightly 13.0
run-name: Version 13.0.${{ github.run_number }}

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  packages: read

env:
  DevExpress_License: ${{ secrets.DEV_EXPRESS_KEY }}

jobs:
  get-latest-commit-timespan:
    runs-on: ubuntu-latest
    outputs:
      LATEST_COMMIT_TIMESPAN: ${{ steps.get-latest-commit-timespan.outputs.LATEST_COMMIT_TIMESPAN}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get the previous commit timespan
        id: get-latest-commit-timespan
        shell: bash
        run: |
          commit=$(git log origin/develop -1 --format="%at")
          echo $commit
          now=$(date +%s)
          echo $now
          timespan=$[now - commit]
          echo "Timespan: ${timespan}"
          echo "LATEST_COMMIT_TIMESPAN=${timespan}" >> $GITHUB_ENV
          echo "LATEST_COMMIT_TIMESPAN=${timespan}" >> $GITHUB_OUTPUT

  build-nightly:
    needs: get-latest-commit-timespan
    # the build-nightly job should be run in 2 cases:
    # - either the workflow was triggered manually (on 'workflow_dispatch')
    # - or the workflow was triggered on schedule and last repository commit is not older than 24h (=86400 sec)
    if: needs.get-latest-commit-timespan.outputs.LATEST_COMMIT_TIMESPAN < 86400 || github.event_name == 'workflow_dispatch'
    runs-on: ${{ vars.GHA_DEFAULT_RUNNER_WINDOWS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Add NuGet Repository
        run: |
          nuget sources add -username Open-Systems-Pharmacology -password ${{ secrets.GITHUB_TOKEN }} -name OSP-GitHub-Packages -source "https://nuget.pkg.github.com/Open-Systems-Pharmacology/index.json"

      - name: define env variables
        run: |
          echo "APP_VERSION=13.0.${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build
        run: |
          rake "update_go_license[ApplicationStartup.cs, ${{ secrets.GO_DIAGRAM_KEY }}]"
          dotnet build PKSim.sln /p:Version=${{env.APP_VERSION}} -p:ExcludeDesigner=true

      - name : Test
        run: dotnet test PKSim.sln -v normal --no-build  --logger:"html;LogFileName=${{ github.workspace }}/testLog_Windows.html"

      - name: Sign PKSim.exe with CodeSignTool
        uses: Open-Systems-Pharmacology/Workflows/.github/actions/codesigner-SSL@main
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        with:
          file_path: ./src/PKSim/bin/Debug/net10.0-windows/PKSim.exe
          
      - name: Sign PKSim.BatchTool.exe with CodeSignTool
        uses: Open-Systems-Pharmacology/Workflows/.github/actions/codesigner-SSL@main
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        with:
          file_path: ./src/PKSim/bin/Debug/net10.0-windows/PKSim.BatchTool.exe
          
      - name: Sign PKSim.CLI.exe with CodeSignTool
        uses: Open-Systems-Pharmacology/Workflows/.github/actions/codesigner-SSL@main
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        with:
          file_path: ./src/PKSim/bin/Debug/net10.0-windows/PKSim.CLI.exe
          
      - name: Create Setup
        run: |
          rake "create_setup[${{env.APP_VERSION}}, Debug]"
          rake "create_portable_setup[${{env.APP_VERSION}}, Debug, pk-sim-portable-setup.zip]"

      - name: Sign PKSim setup with CodeSignTool
        uses: Open-Systems-Pharmacology/Workflows/.github/actions/codesigner-SSL@main
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        with:
          file_path: ./setup/deploy/PK-Sim.${{ env.APP_VERSION }}.msi

      - name: Push test log as artifact
        uses: actions/upload-artifact@v7
        with:
          name: testLog_Windows
          path: ./testLog*.html

      - name: Push nightly installer as artifact
        uses: actions/upload-artifact@v7
        with:
          name: PKSim Installer ${{env.APP_VERSION}}
          path: setup\deploy\*.msi

      - name: Push nightly portable as artifact
        uses: actions/upload-artifact@v7
        with:
          name: PKSim Portable ${{env.APP_VERSION}}
          path: setup\PK-Sim ${{env.APP_VERSION}}

  cleanup-job:
    needs: build-nightly
    # run only if the build-nightly job was skipped
    if: always() && needs.build-nightly.result == 'skipped'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Cancel workflow run
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel"
